name: Weekly Research Data Refresh

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday 08:00 UTC
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Refresh GitHub metrics
        run: npm run refresh:github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh community metrics
        run: npm run refresh:community

      - name: Check staleness (summary only)
        run: npm run check:staleness || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/projects/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'data: weekly GitHub and community metrics refresh'
          title: 'data: weekly GitHub and community metrics refresh'
          body: |
            Automated weekly refresh of research data in project JSONs.

            **GitHub metrics:** stars, forks, open_issues, last_commit_date,
            contributors, total_commits, total_repos, weekly_commits,
            community.github_contributors.

            **Community metrics:** discord_members, telegram_members.

            Review the diff to verify no zero/null values were written from a rate-limited or failed response.
          branch: auto/weekly-metrics-refresh
          delete-branch: true
          labels: data,automated
